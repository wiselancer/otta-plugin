<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B0E14"/>
      <stop offset="1" stop-color="#0E1422"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34D399"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="1000" cy="160" r="420" fill="url(#glow)"/>

  <!-- wordmark -->
  <text x="88" y="190" fill="#FFFFFF" font-size="120" font-weight="800" letter-spacing="-3">Otta</text>
  <rect x="92" y="214" width="120" height="6" rx="3" fill="url(#accent)"/>

  <!-- tagline -->
  <text x="92" y="280" fill="#E6EDF3" font-size="40" font-weight="600">The self-learning AI software factory</text>
  <text x="92" y="324" fill="#8B949E" font-size="24" font-weight="400">A Claude Code plugin — TDD pipeline that improves itself</text>

  <!-- pipeline -->
  <g transform="translate(92,420)">
    <!-- pills -->
    <g font-size="26" font-weight="600" fill="#0B0E14" text-anchor="middle">
      <rect x="0"   y="0" width="200" height="64" rx="32" fill="#FFFFFF"/>
      <text x="100" y="41">build</text>
      <rect x="248" y="0" width="200" height="64" rx="32" fill="#FFFFFF"/>
      <text x="348" y="41">review</text>
      <rect x="496" y="0" width="200" height="64" rx="32" fill="#FFFFFF"/>
      <text x="596" y="41">verify</text>
      <rect x="744" y="0" width="200" height="64" rx="32" fill="url(#accent)"/>
      <text x="844" y="41">ship</text>
    </g>
    <!-- arrows -->
    <g stroke="#8B949E" stroke-width="3" fill="none">
      <path d="M204 32 H244" marker-end="url(#a)"/>
      <path d="M452 32 H492" marker-end="url(#a)"/>
      <path d="M700 32 H740" marker-end="url(#a)"/>
    </g>
    <!-- learn loop -->
    <path d="M844 64 v40 a16 16 0 0 1 -16 16 H100 a16 16 0 0 1 -16 -16 v-26" fill="none" stroke="url(#accent)" stroke-width="3" stroke-dasharray="6 6"/>
    <text x="464" y="150" fill="#34D399" font-size="22" font-weight="600" text-anchor="middle">↻ every gate verdict → learn</text>
  </g>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 z" fill="#8B949E"/>
    </marker>
  </defs>

  <!-- footer -->
  <text x="92" y="600" fill="#6E7681" font-size="22" font-weight="500">otta.build</text>
  <text x="1188" y="600" fill="#6E7681" font-size="22" font-weight="500" text-anchor="end">/plugin install otta</text>
</svg>
