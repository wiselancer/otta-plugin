name: release

# Tag a release: `git tag vX.Y.Z && git push origin vX.Y.Z`.
# This extracts the matching section from CHANGELOG.md and publishes a GitHub Release.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog section for this tag
        id: notes
        run: |
          VER="${GITHUB_REF_NAME#v}"
          awk -v ver="$VER" '
            $0 ~ "^## " ver "([^0-9]|$)" {flag=1; next}
            /^## / && flag {flag=0}
            flag {print}
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then echo "See CHANGELOG.md" > RELEASE_NOTES.md; fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file RELEASE_NOTES.md
